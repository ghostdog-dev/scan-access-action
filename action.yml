name: Scan Access WCAG Audit
description: WCAG 2.2 AA accessibility audit powered by scan-access.com (render-in-CI via Playwright + axe-core + AI fix instructions + lawsuit risk score)
author: scan-access.com

branding:
  icon: check-circle
  color: green

inputs:
  api-key:
    description: scan-access API key (sa_live_... or sa_test_...). Store as a secret.
    required: true
  app-url:
    description: Base URL of the app served in the runner (e.g. http://localhost:4173). Must be http or https.
    required: true
  routes:
    description: |
      Newline-separated list of routes to render (relative to app-url, e.g. "/" or "/pricing").
      Each route is resolved via new URL(route, app-url). Duplicates are ignored.
    required: true
  region:
    description: Compliance region. Either us_ada or eu_eaa.
    required: false
    default: us_ada
  legislations:
    description: Comma-separated legal references to include (e.g. "wcag22aa,ada,eaa") or "all".
    required: false
    default: wcag22aa
  ai-fix:
    description: Generate AI fix instructions for findings (Y/N or true/false).
    required: false
    default: "N"
  fail-on:
    description: Severity threshold to fail the job. never, minor, moderate, serious, critical, any.
    required: false
    default: critical
  output-sarif:
    description: Local path where the SARIF document is written.
    required: false
    default: scan-access.sarif
  api-base-url:
    description: Override base URL for the scan-access API (used for self-hosted or testing).
    required: false
    default: https://api.scan-access.com

outputs:
  scan-id:
    description: UUID of the scan that was created.
  score:
    description: Overall accessibility score (0-100).
  total-violations:
    description: Total number of issues across all severities.
  critical-count:
    description: Number of critical issues.
  serious-count:
    description: Number of serious issues.
  moderate-count:
    description: Number of moderate issues.
  minor-count:
    description: Number of minor issues.
  pdf-url:
    description: Signed URL to download the compliance PDF (null if PDF was not generated).
  scan-url:
    description: Public dashboard URL of the scan result.
  sarif-file:
    description: Path to the local SARIF file written by this action.

runs:
  using: node24
  main: dist/index.js
